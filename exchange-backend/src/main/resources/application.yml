server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: exchange-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/exchange_db
    username: exchange_user
    password: exchange_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: your-256-bit-secret-key-here-make-it-long-and-secure-for-production-use
    expiration: 86400000

  finnhub:
    api-key: ${FINNHUB_API_KEY:demo}
    base-url: https://finnhub.io/api/v1

  polygon:
    api-key: ${POLYGON_API_KEY:demo}
    base-url: https://api.polygon.io

  coinbase:
    base-url: https://api.exchange.coinbase.com

  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_CHAT_MODEL:llama3.2}
    embedding-model: ${OLLAMA_EMBED_MODEL:all-minilm}

  rag:
    enabled: ${RAG_ENABLED:true}
    top-k: ${RAG_TOP_K:3}
    similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0.5}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
    max-age: ${CORS_MAX_AGE:3600}

  rate-limit:
    login:
      max-requests: ${RATE_LIMIT_LOGIN_MAX:5}
      window-seconds: ${RATE_LIMIT_LOGIN_WINDOW:60}
    register:
      max-requests: ${RATE_LIMIT_REGISTER_MAX:5}
      window-seconds: ${RATE_LIMIT_REGISTER_WINDOW:60}
    prices:
      max-requests: ${RATE_LIMIT_PRICES_MAX:120}
      window-seconds: ${RATE_LIMIT_PRICES_WINDOW:60}

